# =============================================================
# Security Company -- Hardened Nginx Configuration
# For: SecureShop E-Commerce Platform
# Date: 2025-04-05
#
# Addresses findings: SC-008, SC-009, SC-011, SC-012,
#                     SC-013, SC-016, SC-019, SC-020
# =============================================================

# -- Global Settings ------------------------------------------------
user                    nginx;
worker_processes        auto;
error_log               /var/log/nginx/error.log warn;
pid                     /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    # -- Basic Settings ---------------------------------------------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # -- Log Format (enhanced for security auditing) ----------------
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request_method $request_uri $server_protocol" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time';
    access_log          /var/log/nginx/access.log security;

    # -- Server Tokens (SC-016: Hide version info) ------------------
    server_tokens       off;
    more_clear_headers  'Server' 'X-Powered-By' 'X-AspNet-Version' 'X-Runtime';

    # -- Rate Limiting Zones (SC-009) -------------------------------
    # 10MB zone stores ~160,000 IP addresses
    limit_req_zone      $binary_remote_addr zone=api_general:10m rate=100r/m;
    limit_req_zone      $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone      $binary_remote_addr zone=checkout:10m rate=10r/m;
    limit_req_zone      $binary_remote_addr zone=upload:10m rate=3r/m;

    # Return JSON 429 responses
    limit_req_status    429;

    # -- Geo-blocking (optional -- block known malicious ranges) ----
    # geo $blocked_ip {
    #     default 0;
    #     45.155.205.0/24 1;
    #     185.220.101.0/24 1;
    #     194.26.29.0/24 1;
    # }

    # -- Upstream Backend -------------------------------------------
    upstream backend {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ================================================================
    # SSL Configuration (SC-008: TLS hardening)
    # ================================================================
    # This should be included in the server block
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    # ssl_prefer_server_ciphers on;
    # ssl_session_timeout 1d;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_tickets off;
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # ================================================================
    # Server: HTTP -> HTTPS Redirect
    # ================================================================
    server {
        listen      80;
        listen      [::]:80;
        server_name secureshop.com.br www.secureshop.com.br;

        # Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # ================================================================
    # Server: HTTPS Main
    # ================================================================
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name secureshop.com.br www.secureshop.com.br;

        # SSL Certificate (replace with actual paths)
        ssl_certificate         /etc/ssl/certs/secureshop.com.br/fullchain.pem;
        ssl_certificate_key     /etc/ssl/private/secureshop.com.br/privkey.pem;

        # SSL Hardening
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_timeout     1d;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_tickets     off;
        ssl_stapling            on;
        ssl_stapling_verify     on;
        resolver                8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout        5s;

        # HSTS (Strict-Transport-Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # -- Security Headers (SC-011, SC-012, SC-019) ---------------
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;

        # CORS (SC-014)
        add_header Access-Control-Allow-Origin "https://www.secureshop.com.br" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "86400" always;

        # Cache control for static assets
        add_header Cache-Control "public, max-age=31536000, immutable";

        # -- Request Size Limits -------------------------------------
        client_max_body_size    10m;
        client_body_timeout     12s;
        client_header_timeout   12s;
        keepalive_timeout       15s;
        send_timeout            10s;

        # -- Block TRACE method (SC-020) ----------------------------
        if ($request_method = TRACE) {
            return 405;
        }

        # -- Block suspicious user agents ---------------------------
        if ($http_user_agent ~* (sqlmap|nikto|nmap|nessus|w3af|burpsuite|dirbuster|gobuster|dirb)) {
            return 403;
        }

        # -- Block access to sensitive files/directories (SC-003, SC-013, SC-021)
        location ~* /(\.git|\.env|\.htaccess|\.htpasswd|config|backups|backup|\.sql|phpmyadmin|wp-admin|server-status|server-info|\.swp|\.bak|\.old|\.orig) {
            deny all;
            return 403;
        }

        # ================================================================
        # Route Definitions
        # ================================================================

        # Login endpoint (SC-009: Strict rate limiting)
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Checkout (SC-009: Rate limited)
        location /api/v1/checkout {
            limit_req zone=checkout burst=5 nodelay;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Image upload (SC-004: SSRF prevention rate limit)
        location /api/v1/products/upload-image {
            limit_req zone=upload burst=2 nodelay;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Uploads directory (SC-013: No directory listing)
        location /uploads/ {
            autoindex off;

            # Only serve images and PDFs
            location ~* \.(jpg|jpeg|png|gif|webp|pdf|svg)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                try_files $uri =404;
            }

            # Deny everything else
            location ~* / {
                return 403;
            }
        }

        # General API (SC-009: Default rate limiting)
        location /api/v1/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # Strip potentially dangerous headers before proxying
            proxy_hide_header   X-Powered-By;
            proxy_hide_header   Server;
        }

        # Admin panel (restrict by IP if possible)
        location /admin/ {
            # allow 10.0.0.0/8;   # Internal network only
            # deny all;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Static files
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            root                /var/www/secureshop/public;
            expires             30d;
            add_header          Cache-Control "public, immutable";
            access_log          off;
        }

        # Root / Frontend app
        location / {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (no rate limit)
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Custom error pages
        error_page 429 /429.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Please try again later.","retry_after":60}';
        }

        location = /50x.html {
            internal;
            root /var/www/errors;
        }
    }
}
