<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - dev_agency</title>
    <!-- React via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Lucide icons via CDN -->
    <style>
        /* ---------- Reset & base ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        /* ---------- Layout ---------- */
        .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; }
        /* ---------- Header ---------- */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #1e293b;
            padding: 1rem 0;
        }
        .header-inner { max-width: 900px; margin: 0 auto; padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.25rem; color: #38bdf8; }
        .header-logo { font-weight: 700; color: #38bdf8; }
        /* ---------- Buttons ---------- */
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1rem; border: none; border-radius: 0.5rem;
            font-size: 0.875rem; font-weight: 500; cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #f87171; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; color: #e2e8f0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* ---------- Cards ---------- */
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; }
        /* ---------- Forms ---------- */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.875rem; color: #94a3b8; }
        .form-input {
            width: 100%; padding: 0.6rem 0.8rem; border-radius: 0.5rem;
            border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
            font-size: 0.9rem; outline: none; transition: border-color 0.15s;
        }
        .form-input:focus { border-color: #38bdf8; }
        .form-input::placeholder { color: #475569; }
        textarea.form-input { resize: vertical; min-height: 80px; }
        .form-select {
            width: 100%; padding: 0.6rem 0.8rem; border-radius: 0.5rem;
            border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
            font-size: 0.9rem; outline: none;
        }
        /* ---------- Auth ---------- */
        .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .auth-card { width: 100%; max-width: 400px; }
        .auth-card h2 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; }
        .auth-error { background: #451a23; color: #fca5a5; padding: 0.6rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; }
        /* ---------- Dashboard ---------- */
        .dashboard { padding: 1.5rem 0; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
        .stat-card { text-align: center; padding: 1rem; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #38bdf8; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        /* ---------- Task list ---------- */
        .task-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .task-actions-bar { display: flex; gap: 0.5rem; align-items: center; }
        .filter-select { width: auto; }
        .task-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .task-item {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 0.8rem 1rem; background: #1e293b; border: 1px solid #334155;
            border-radius: 0.5rem; transition: all 0.15s;
        }
        .task-item:hover { border-color: #475569; }
        .task-item.completed { opacity: 0.6; }
        .task-main { flex: 1; }
        .task-title { font-weight: 600; margin-bottom: 0.15rem; }
        .task-meta { font-size: 0.8rem; color: #64748b; }
        .task-buttons { display: flex; gap: 0.3rem; flex-shrink: 0; margin-left: 0.5rem; }
        .btn-sm { padding: 0.3rem 0.5rem; font-size: 0.75rem; border-radius: 0.375rem; }

        /* Badges */
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; margin-right: 0.4rem; }
        .badge-pending { background: #422006; color: #fbbf24; }
        .badge-in_progress { background: #1e3a5f; color: #60a5fa; }
        .badge-completed { background: #052e16; color: #4ade80; }
        .badge-cancelled { background: #450a0a; color: #f87171; }
        .badge-low { background: #172554; color: #60a5fa; border: 1px solid #1e3a5f; }
        .badge-medium { background: #422006; color: #fbbf24; border: 1px solid #713f12; }
        .badge-high { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }

        /* ---------- Modal ---------- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; padding:1rem; z-index: 50;
        }
        .modal-card { width: 100%; max-width: 480px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { color: #38bdf8; }
        .close-x { background: none; border: none; color: #64748b; font-size: 1.2rem; cursor: pointer; }
        .close-x:hover { color: #e2e8f0; }

        /* ---------- Spinner ---------- */
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-wrap { display: flex; justify-content: center; padding: 3rem; }

        .empty { text-align: center; padding: 3rem 1rem; color: #64748b; }

        .user-bar { display: flex; align-items: center; gap: 0.75rem; }
        .user-bar span { color: #94a3b8; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="app.js" type="text/babel"></script>
</body>
</html>
